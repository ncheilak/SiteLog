<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteLog — Ορισμός Κωδικού</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #0c0c0c;
    --yellow:   #f5c800;
    --yellow-dk:#c9a000;
    --orange:   #e8600a;
    --white:    #f0ebe0;
    --gray:     #181818;
    --gray2:    #222;
    --gray3:    #2e2e2e;
    --gray4:    #444;
    --gray5:    #666;
    --green:    #1fa644;
    --red:      #e53e3e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      -55deg, transparent, transparent 28px,
      rgba(245,200,0,0.018) 28px, rgba(245,200,0,0.018) 29px
    );
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: var(--orange);
  }

  .login-card {
    position: relative;
    width: 100%;
    max-width: 420px;
    background: var(--gray);
    border: 1px solid var(--gray3);
    border-radius: 3px;
    overflow: hidden;
    animation: slideUp 0.35s ease both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    background: var(--yellow);
    padding: 22px 28px 18px;
    border-bottom: 3px solid var(--orange);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--black);
    line-height: 1;
  }
  .logo em { color: var(--orange); font-style: normal; }
  .logo sub {
    font-size: 0.55rem;
    letter-spacing: 1px;
    opacity: 0.55;
    vertical-align: middle;
    margin-left: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
  }
  .card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--black);
    opacity: 0.5;
    margin-top: 6px;
  }

  .card-body { padding: 28px; }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 6px;
  }
  .page-sub {
    font-size: 0.8rem;
    color: var(--gray5);
    margin-bottom: 22px;
    line-height: 1.55;
  }

  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray5);
    margin-bottom: 7px;
  }
  input[type="password"] {
    width: 100%;
    background: var(--gray2);
    border: 1px solid var(--gray3);
    border-radius: 2px;
    color: var(--white);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.95rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.18s;
  }
  input:focus { border-color: var(--yellow); }
  input::placeholder { color: var(--gray4); }

  /* Password strength bar */
  .strength-bar {
    height: 3px;
    background: var(--gray3);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
    width: 0%;
  }
  .strength-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 1px;
    color: var(--gray5);
    margin-top: 4px;
    min-height: 14px;
  }

  .btn-primary {
    width: 100%;
    background: var(--yellow);
    color: var(--black);
    border: none;
    border-radius: 2px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    padding: 13px;
    cursor: pointer;
    transition: background 0.18s, opacity 0.18s;
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-primary:hover:not(:disabled) { background: var(--yellow-dk); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: var(--black);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn-primary.loading .spinner { display: block; }
  .btn-primary.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .msg {
    padding: 11px 14px;
    border-radius: 2px;
    font-size: 0.82rem;
    margin-bottom: 16px;
    display: none;
    line-height: 1.5;
  }
  .msg.error   { background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.35); color: #fc8181; display: block; }
  .msg.success { background: rgba(31,166,68,0.12); border: 1px solid rgba(31,166,68,0.35); color: #68d391; display: block; }
  .msg.info    { background: rgba(245,200,0,0.08); border: 1px solid rgba(245,200,0,0.25); color: var(--yellow); display: block; }

  /* Loading state ολόκληρης της σελίδας */
  #loadingState { text-align: center; padding: 20px 0; }
  .loading-dots {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--gray5);
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .version-badge {
    margin-top: 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 1.5px;
    color: var(--gray4);
    text-align: center;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="card-top">
    <div class="logo">Site<em>Log</em><sub>v3.0</sub></div>
    <div class="card-label" id="cardLabel">Ορισμός Κωδικού</div>
  </div>

  <div class="card-body">

    <!-- Loading -->
    <div id="loadingState">
      <div class="loading-dots">Φόρτωση...</div>
    </div>

    <!-- Error state (invalid/expired token) -->
    <div id="errorState" style="display:none;">
      <div class="msg error" id="errorMsg"></div>
      <a href="login.html" style="display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:1px;color:var(--gray5);text-decoration:none;transition:color 0.15s;"
         onmouseover="this.style.color='var(--yellow)'" onmouseout="this.style.color='var(--gray5)'">
        ← Επιστροφή στη σύνδεση
      </a>
    </div>

    <!-- Form state -->
    <div id="formState" style="display:none;">
      <div class="page-title" id="formTitle">ΟΡΙΣΜΟΣ ΚΩΔΙΚΟΥ</div>
      <p class="page-sub" id="formSub">Επέλεξε έναν ασφαλή κωδικό για τον λογαριασμό σου.</p>

      <div id="formMsg" class="msg"></div>

      <div class="field">
        <label for="newPassword">Νέος Κωδικός</label>
        <input type="password" id="newPassword" placeholder="Τουλάχιστον 8 χαρακτήρες" autocomplete="new-password">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <div class="field">
        <label for="confirmPassword">Επαλήθευση Κωδικού</label>
        <input type="password" id="confirmPassword" placeholder="Ξαναγράψε τον κωδικό" autocomplete="new-password">
      </div>

      <button class="btn-primary" id="setPasswordBtn">
        <div class="spinner"></div>
        <span class="btn-text">Αποθήκευση Κωδικού</span>
      </button>
    </div>

    <!-- Success state -->
    <div id="successState" style="display:none;">
      <div class="msg success">Ο κωδικός σου ορίστηκε επιτυχώς! Μεταφέρεσαι στη σελίδα εισόδου...</div>
    </div>

  </div>
</div>

<div class="version-badge">SiteLog v3.0 · Σύστημα Παρουσίας</div>

<!-- Πιάνουμε το type από το hash ΠΡΙΝ φορτώσει ο Supabase client και το σβήσει -->
<script>
  window._hashType = new URLSearchParams(window.location.hash.slice(1)).get('type');
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/auth.js"></script>
<script>
(async () => {

  const loadingEl = document.getElementById('loadingState');
  const errorEl   = document.getElementById('errorState');
  const formEl    = document.getElementById('formState');
  const successEl = document.getElementById('successState');
  const errorMsg  = document.getElementById('errorMsg');
  const formMsg   = document.getElementById('formMsg');
  const cardLabel = document.getElementById('cardLabel');
  const formTitle = document.getElementById('formTitle');
  const formSub   = document.getElementById('formSub');

  function show(el) {
    [loadingEl, errorEl, formEl, successEl].forEach(e => e.style.display = 'none');
    el.style.display = 'block';
  }

  function showInviteForm() {
    cardLabel.textContent = 'Ορισμός Κωδικού';
    formTitle.textContent = 'ΟΡΙΣΜΟΣ ΚΩΔΙΚΟΥ';
    formSub.textContent   = 'Καλωσήρθες στο SiteLog! Επέλεξε έναν κωδικό για τον λογαριασμό σου.';
    show(formEl);
  }

  function showRecoveryForm() {
    cardLabel.textContent = 'Επαναφορά Κωδικού';
    formTitle.textContent = 'ΕΠΑΝΑΦΟΡΑ ΚΩΔΙΚΟΥ';
    formSub.textContent   = 'Επέλεξε έναν νέο ασφαλή κωδικό για τον λογαριασμό σου.';
    show(formEl);
  }

  // Ο Supabase διαγράφει το hash αμέσως κατά το init —
  // γι' αυτό το πιάσαμε ήδη στο window._hashType πριν φορτώσει.
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      showRecoveryForm();
    } else if (event === 'SIGNED_IN') {
      if (window._hashType === 'invite' || window._hashType === 'signup') {
        showInviteForm();
      } else {
        // Ήδη logged in, όχι invite/recovery → index
        window.location.href = 'index.html';
      }
    }
  });

  // Fallback: έλεγχος υπάρχουσας session αν το onAuthStateChange
  // δεν πυροδοτηθεί (π.χ. token ήδη processed σε προηγούμενο load)
  setTimeout(async () => {
    if (loadingEl.style.display === 'none') return; // ήδη handled

    const { data: { session } } = await sb.auth.getSession();
    if (session && window._hashType === 'invite') {
      showInviteForm();
    } else if (session && window._hashType === 'recovery') {
      showRecoveryForm();
    } else if (session) {
      window.location.href = 'index.html';
    } else {
      errorMsg.textContent = 'Ο σύνδεσμος δεν είναι έγκυρος ή έχει λήξει. Ζήτησε νέο σύνδεσμο από τον διαχειριστή.';
      show(errorEl);
    }
  }, 1500);

  // ── PASSWORD STRENGTH ──
  const newPassEl  = document.getElementById('newPassword');
  const strengthFill  = document.getElementById('strengthFill');
  const strengthLabel = document.getElementById('strengthLabel');

  const colors = ['', '#e53e3e', '#e8600a', '#f5c800', '#1fa644'];
  const labels = ['', 'Πολύ αδύναμος', 'Αδύναμος', 'Μέτριος', 'Ισχυρός'];

  newPassEl.addEventListener('input', () => {
    const pw = newPassEl.value;
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw) || /[^a-zA-Z0-9]/.test(pw)) score++;
    score = Math.min(score, 4);
    strengthFill.style.width    = (score * 25) + '%';
    strengthFill.style.background = colors[score] || 'transparent';
    strengthLabel.textContent   = pw.length ? labels[score] : '';
  });

  // ── SET PASSWORD ──
  const setBtn = document.getElementById('setPasswordBtn');
  const confirmEl = document.getElementById('confirmPassword');

  function showFormMsg(text, type) {
    formMsg.textContent = text;
    formMsg.className = 'msg ' + type;
  }
  function setLoading(val) {
    setBtn.disabled = val;
    setBtn.classList.toggle('loading', val);
  }

  setBtn.addEventListener('click', async () => {
    const pw1 = newPassEl.value;
    const pw2 = confirmEl.value;

    if (pw1.length < 8) {
      showFormMsg('Ο κωδικός πρέπει να έχει τουλάχιστον 8 χαρακτήρες.', 'error');
      return;
    }
    if (pw1 !== pw2) {
      showFormMsg('Οι κωδικοί δεν ταιριάζουν.', 'error');
      return;
    }

    setLoading(true);
    formMsg.className = 'msg';

    const { error } = await sb.auth.updateUser({ password: pw1 });

    if (error) {
      showFormMsg('Σφάλμα: ' + error.message, 'error');
      setLoading(false);
      return;
    }

    show(successEl);
    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
  });

  confirmEl.addEventListener('keydown', e => { if (e.key === 'Enter') setBtn.click(); });

})();
</script>
</body>
</html>
