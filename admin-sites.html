<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteLog — Εργοτάξια</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/theme.css">
<style>
  /* ── PAGE-SPECIFIC ── */
  body { display: flex; flex-direction: column; }

  .page { flex: 1; padding: 36px 28px 64px; max-width: 1100px; width: 100%; margin: 0 auto; }

  .breadcrumb { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 1px; color: var(--gray5); margin-bottom: 28px; }
  .breadcrumb a { color: var(--gray5); text-decoration: none; transition: color var(--t-fast); }
  .breadcrumb a:hover { color: var(--yellow); }
  .breadcrumb span { color: var(--gray4); }

  .page-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .page-title { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: -0.02em; color: var(--white); line-height: 1; }
  .page-title span { color: var(--yellow); }

  .stats-bar { display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { font-family: var(--font-mono); }
  .stat-num { font-size: 1.4rem; font-weight: 600; color: var(--yellow); display: block; line-height: 1; }
  .stat-label { font-size: 0.58rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray5); margin-top: 3px; }

  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-input { background: var(--gray2); border: 1px solid var(--gray3); border-radius: var(--radius); color: var(--white); font-family: var(--font-body); font-size: 0.88rem; padding: 9px 14px; outline: none; transition: border-color var(--t-fast), box-shadow var(--t-fast); flex: 1; min-width: 180px; }
  .filter-input:focus { border-color: var(--yellow); box-shadow: 0 0 0 3px var(--yellow-glow); }
  .filter-input::placeholder { color: var(--gray4); }
  .filter-toggle { display: flex; gap: 1px; background: var(--gray3); border-radius: var(--radius); overflow: hidden; }
  .filter-toggle button { background: var(--gray2); color: var(--gray5); border: none; font-family: var(--font-mono); font-size: 0.6rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 9px 14px; cursor: pointer; transition: background var(--t-fast), color var(--t-fast); }
  .filter-toggle button.active { background: var(--yellow); color: var(--black); }

  .table-wrap { background: var(--gray); border: 1px solid var(--gray3); border-radius: 3px; overflow: hidden; }
  table { border-collapse: collapse; }
  thead { background: var(--gray2); border-bottom: 2px solid var(--gray3); }
  th { font-family: var(--font-mono); font-size: 0.58rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray5); padding: 12px 16px; text-align: left; white-space: nowrap; border-bottom: none; }
  th.center { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--gray3); transition: background var(--t-fast); cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--gray2); }
  td { padding: 14px 16px; font-size: 0.85rem; vertical-align: middle; }
  .td-code  { font-family: var(--font-mono); font-size: 0.78rem; font-weight: 600; color: var(--yellow); letter-spacing: 1px; }
  .td-name  { font-weight: 500; }
  .td-sub   { color: var(--gray5); font-size: 0.8rem; }
  .td-date  { font-family: var(--font-mono); font-size: 0.72rem; color: var(--gray5); }
  .center   { text-align: center; }
  .badge-active   { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3); color: #86efac; }
  .badge-inactive { background: rgba(100,100,100,.12); border: 1px solid rgba(100,100,100,.3); color: var(--gray5); }
  .td-actions { text-align: center; width: 80px; }
  .btn-edit { background: none; border: 1px solid var(--gray3); border-radius: var(--radius); color: var(--gray5); font-family: var(--font-mono); font-size: 0.6rem; font-weight: 600; letter-spacing: 1px; padding: 5px 10px; cursor: pointer; transition: border-color var(--t-fast), color var(--t-fast); }
  .btn-edit:hover { border-color: var(--yellow); color: var(--yellow); }
  .empty-row td { text-align: center; color: var(--gray5); font-size: 0.82rem; padding: 40px; font-family: var(--font-mono); letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <div class="logo">Site<em>Log</em><sub>v3.0</sub></div>
  <div class="user-menu">
    <div class="user-info">
      <div class="user-name" id="userName"></div>
      <div class="user-role">Admin</div>
    </div>
    <button class="btn-signout" id="signOutBtn">Έξοδος</button>
  </div>
</header>

<div class="page">
  <div class="breadcrumb">
    <a href="index.html">Αρχική</a><span>›</span><span>Εργοτάξια</span>
  </div>
  <div class="page-header">
    <div class="page-title">ΕΡΓΟ<span>ΤΑΞΙΑ</span></div>
    <a class="btn btn-yellow btn-md" href="admin-site-edit.html">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Νέο Εργοτάξιο
    </a>
  </div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="statTotal">—</span><div class="stat-label">Σύνολο</div></div>
    <div class="stat"><span class="stat-num" id="statActive" style="color:var(--green)">—</span><div class="stat-label">Ενεργά</div></div>
    <div class="stat"><span class="stat-num" id="statInactive" style="color:var(--gray5)">—</span><div class="stat-label">Ανενεργά</div></div>
  </div>
  <div class="filter-bar">
    <input class="filter-input" type="text" id="searchInput" placeholder="Αναζήτηση (κωδικός, όνομα, πελάτης, περιοχή)…">
    <div class="filter-toggle">
      <button class="active" data-filter="all">Όλα</button>
      <button data-filter="active">Ενεργά</button>
      <button data-filter="inactive">Ανενεργά</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Κωδικός</th><th>Ονομασία</th><th>Πελάτης</th><th>Περιοχή</th>
          <th>Έναρξη</th><th class="center">Κατάσταση</th><th class="center">Ενέργειες</th>
        </tr>
      </thead>
      <tbody id="sitesBody"><tr class="empty-row"><td colspan="7">Φόρτωση…</td></tr></tbody>
    </table>
  </div>
</div>

<footer>
  <div class="footer-logo">Site<em>Log</em></div>
</footer>

<div id="toast" class="toast" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/auth.js"></script>
<script>
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

(async () => {
  const ok = await Auth.requireRole(['admin']);
  if (!ok) return;
  document.getElementById('userName').textContent = Auth.getCurrentUser().full_name;
  document.getElementById('signOutBtn').addEventListener('click', () => Auth.signOut());

  let allSites = [], filterStatus = 'all', searchTerm = '';

  async function loadSites() {
    const { data, error } = await sb.from('sites').select('id, project_code, name, client, region, start_date, is_active').order('project_code');
    if (error) { showToast('Σφάλμα φόρτωσης: ' + error.message, 'error'); return; }
    allSites = data || [];
    updateStats(); renderTable();
  }

  function updateStats() {
    const active = allSites.filter(s => s.is_active).length;
    document.getElementById('statTotal').textContent    = allSites.length;
    document.getElementById('statActive').textContent   = active;
    document.getElementById('statInactive').textContent = allSites.length - active;
  }

  function renderTable() {
    const body = document.getElementById('sitesBody');
    let f = allSites;
    if (filterStatus === 'active')   f = f.filter(s => s.is_active);
    if (filterStatus === 'inactive') f = f.filter(s => !s.is_active);
    if (searchTerm) { const q = searchTerm.toLowerCase(); f = f.filter(s => ['project_code','name','client','region'].some(k => (s[k]||'').toLowerCase().includes(q))); }
    if (!f.length) { body.innerHTML = '<tr class="empty-row"><td colspan="7">Δεν βρέθηκαν εργοτάξια</td></tr>'; return; }
    body.innerHTML = f.map(s => `
      <tr onclick="window.location.href='admin-site-edit.html?id=${s.id}'">
        <td class="td-code">${esc(s.project_code)}</td>
        <td class="td-name">${esc(s.name)}</td>
        <td class="td-sub">${esc(s.client||'—')}</td>
        <td class="td-sub">${esc(s.region||'—')}</td>
        <td class="td-date">${fmtDate(s.start_date)}</td>
        <td class="center"><span class="badge ${s.is_active?'badge-active':'badge-inactive'}">${s.is_active?'Ενεργό':'Ανενεργό'}</span></td>
        <td class="td-actions" onclick="event.stopPropagation()"><button class="btn-edit" onclick="window.location.href='admin-site-edit.html?id=${s.id}'">Επεξ.</button></td>
      </tr>`).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('el-GR',{day:'2-digit',month:'2-digit',year:'numeric'}); }

  document.querySelectorAll('.filter-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); filterStatus = btn.dataset.filter; renderTable();
    });
  });
  document.getElementById('searchInput').addEventListener('input', e => { searchTerm = e.target.value.trim(); renderTable(); });

  const params = new URLSearchParams(window.location.search);
  if (params.get('saved') === '1') showToast('Το εργοτάξιο αποθηκεύτηκε επιτυχώς.');
  if (params.get('saved') === 'new') showToast('Νέο εργοτάξιο δημιουργήθηκε επιτυχώς.');

  await loadSites();
})();
</script>
</body>
</html>
