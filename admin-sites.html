<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteLog — Εργοτάξια</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/theme.css">
<style>
  :root {
    --black:#0c0c0c; --yellow:#f5c800; --yellow-dk:#c9a000; --yellow-dim:rgba(245,200,0,0.08);
    --orange:#e8600a; --white:#f0ebe0; --gray:#181818; --gray2:#222; --gray3:#2e2e2e;
    --gray4:#444; --gray5:#666; --green:#1fa644; --red:#e53e3e;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--black); color:var(--white); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

  /* HEADER */
  header { background:var(--yellow); color:var(--black); padding:0 28px; height:54px; display:flex; align-items:center; justify-content:space-between; border-bottom:4px solid var(--orange); position:sticky; top:0; z-index:200; gap:12px; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:3px; flex-shrink:0; }
  .logo em { color:var(--orange); font-style:normal; }
  .logo sub { font-size:0.6rem; letter-spacing:1px; opacity:.55; vertical-align:middle; margin-left:7px; font-family:'IBM Plex Mono',monospace; font-weight:600; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .user-name { font-size:0.82rem; font-weight:600; color:var(--black); }
  .btn-signout { background:var(--black); color:var(--yellow); border:none; border-radius:2px; font-family:'IBM Plex Mono',monospace; font-size:0.58rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; padding:7px 12px; cursor:pointer; }
  .btn-signout:hover { opacity:.8; }

  /* PAGE LAYOUT */
  .page { flex:1; padding:36px 28px 64px; max-width:1100px; width:100%; margin:0 auto; }

  /* BREADCRUMB */
  .breadcrumb { display:flex; align-items:center; gap:8px; font-family:'IBM Plex Mono',monospace; font-size:0.6rem; letter-spacing:1px; color:var(--gray5); margin-bottom:28px; }
  .breadcrumb a { color:var(--gray5); text-decoration:none; transition:color .15s; }
  .breadcrumb a:hover { color:var(--yellow); }
  .breadcrumb span { color:var(--gray4); }

  /* PAGE HEADER */
  .page-header { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:28px; flex-wrap:wrap; }
  .page-title { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:4px; color:var(--white); line-height:1; }
  .page-title span { color:var(--yellow); }

  .btn-primary { display:inline-flex; align-items:center; gap:8px; background:var(--yellow); color:var(--black); border:none; border-radius:2px; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:2px; padding:10px 18px; cursor:pointer; transition:background .18s; white-space:nowrap; text-decoration:none; }
  .btn-primary:hover { background:var(--yellow-dk); }

  /* FILTER BAR */
  .filter-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .filter-input { background:var(--gray2); border:1px solid var(--gray3); border-radius:2px; color:var(--white); font-family:'IBM Plex Sans',sans-serif; font-size:0.88rem; padding:9px 14px; outline:none; transition:border-color .18s; flex:1; min-width:180px; }
  .filter-input:focus { border-color:var(--yellow); }
  .filter-input::placeholder { color:var(--gray4); }
  .filter-toggle { display:flex; gap:1px; background:var(--gray3); border-radius:2px; overflow:hidden; }
  .filter-toggle button { background:var(--gray2); color:var(--gray5); border:none; font-family:'IBM Plex Mono',monospace; font-size:0.6rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; padding:9px 14px; cursor:pointer; transition:background .15s,color .15s; }
  .filter-toggle button.active { background:var(--yellow); color:var(--black); }

  /* TABLE */
  .table-wrap { background:var(--gray); border:1px solid var(--gray3); border-radius:3px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead { background:var(--gray2); border-bottom:2px solid var(--gray3); }
  th { font-family:'IBM Plex Mono',monospace; font-size:0.58rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray5); padding:12px 16px; text-align:left; white-space:nowrap; }
  th.center { text-align:center; }
  tbody tr { border-bottom:1px solid var(--gray3); transition:background .15s; cursor:pointer; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--gray2); }
  td { padding:14px 16px; font-size:0.85rem; vertical-align:middle; }

  .td-code { font-family:'IBM Plex Mono',monospace; font-size:0.78rem; font-weight:600; color:var(--yellow); letter-spacing:1px; }
  .td-name { font-weight:500; }
  .td-client { color:var(--gray5); font-size:0.8rem; }
  .td-region { color:var(--gray5); font-size:0.8rem; }
  .td-date { font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--gray5); }

  /* STATUS BADGE */
  .badge { display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:0.55rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; padding:3px 8px; border-radius:10px; }
  .badge-active   { background:rgba(31,166,68,.15); border:1px solid rgba(31,166,68,.35); color:#68d391; }
  .badge-inactive { background:rgba(100,100,100,.15); border:1px solid rgba(100,100,100,.3); color:var(--gray5); }

  /* ACTIONS */
  .td-actions { text-align:center; width:80px; }
  .btn-edit { background:none; border:1px solid var(--gray3); border-radius:2px; color:var(--gray5); font-family:'IBM Plex Mono',monospace; font-size:0.6rem; font-weight:600; letter-spacing:1px; padding:5px 10px; cursor:pointer; transition:all .15s; }
  .btn-edit:hover { border-color:var(--yellow); color:var(--yellow); }

  /* EMPTY / LOADING */
  .empty-row td { text-align:center; color:var(--gray5); font-size:0.82rem; padding:40px; font-family:'IBM Plex Mono',monospace; letter-spacing:1px; }

  /* STATS BAR */
  .stats-bar { display:flex; gap:24px; margin-bottom:20px; flex-wrap:wrap; }
  .stat { font-family:'IBM Plex Mono',monospace; }
  .stat-num { font-size:1.4rem; font-weight:600; color:var(--yellow); display:block; line-height:1; }
  .stat-label { font-size:0.58rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray5); margin-top:3px; }

  /* TOAST */
  .toast { position:fixed; bottom:28px; right:28px; background:var(--gray); border:1px solid var(--gray3); border-left:3px solid var(--green); border-radius:2px; padding:14px 18px; font-size:0.82rem; color:var(--white); z-index:1000; transform:translateY(20px); opacity:0; transition:all .3s; pointer-events:none; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.error { border-left-color:var(--red); }

  footer { border-top:1px solid var(--gray3); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; }
  .footer-logo { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:3px; color:var(--gray4); }
  .footer-logo em { color:var(--orange); font-style:normal; }
</style>
</head>
<body>

<header>
  <div class="logo">Site<em>Log</em><sub>Εργοτάξια</sub></div>
  <div class="user-menu">
    <div class="user-info">
      <div class="user-name" id="userName"></div>
      <div class="user-role" id="userRoleLabel"></div>
    </div>
    <a href="index.html" class="btn-back">← Αρχική</a>
    <button class="btn-signout" onclick="Auth.signOut()">Έξοδος</button>
  </div>
</header>

<div class="page">

  <!-- BREADCRUMB -->

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div>
      <div class="page-title">ΕΡΓΟ<span>ΤΑΞΙΑ</span></div>
    </div>
    <a class="btn-primary" href="admin-site-edit.html">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Νέο Εργοτάξιο
    </a>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="statTotal">—</span><div class="stat-label">Σύνολο</div></div>
    <div class="stat"><span class="stat-num" id="statActive" style="color:var(--green)">—</span><div class="stat-label">Ενεργά</div></div>
    <div class="stat"><span class="stat-num" id="statInactive" style="color:var(--gray5)">—</span><div class="stat-label">Ανενεργά</div></div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <input class="filter-input" type="text" id="searchInput" placeholder="Αναζήτηση (κωδικός, όνομα, πελάτης, περιοχή)…">
    <div class="filter-toggle">
      <button class="active" data-filter="all">Όλα</button>
      <button data-filter="active">Ενεργά</button>
      <button data-filter="inactive">Ανενεργά</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Κωδικός</th>
          <th>Ονομασία</th>
          <th>Πελάτης</th>
          <th>Περιοχή</th>
          <th>Έναρξη</th>
          <th class="center">Κατάσταση</th>
          <th class="center">Ενέργειες</th>
        </tr>
      </thead>
      <tbody id="sitesBody">
        <tr class="empty-row"><td colspan="7">Φόρτωση…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<footer>
  <div class="footer-logo">Site<em>Log</em></div>
</footer>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/auth.js"></script>
<script>
(async () => {

  const ok = await Auth.requireRole(['admin']);
  if (!ok) return;

  document.getElementById('userName').textContent = Auth.getCurrentUser().full_name;
  const _rl = document.getElementById('userRoleLabel'); if (_rl) _rl.textContent = Auth.getRoleLabel();
  document.getElementById('signOutBtn').addEventListener('click', () => Auth.signOut());

  // ── LOAD SITES ──
  let allSites = [];
  let filterStatus = 'all';
  let searchTerm   = '';

  async function loadSites() {
    const { data, error } = await sb
      .from('sites')
      .select('id, project_code, name, client, region, start_date, is_active')
      .order('project_code');

    if (error) { showToast('Σφάλμα φόρτωσης: ' + error.message, true); return; }
    allSites = data || [];
    updateStats();
    renderTable();
  }

  function updateStats() {
    const active   = allSites.filter(s => s.is_active).length;
    const inactive = allSites.length - active;
    document.getElementById('statTotal').textContent   = allSites.length;
    document.getElementById('statActive').textContent  = active;
    document.getElementById('statInactive').textContent= inactive;
  }

  function renderTable() {
    const body = document.getElementById('sitesBody');
    let filtered = allSites;

    // Status filter
    if (filterStatus === 'active')   filtered = filtered.filter(s => s.is_active);
    if (filterStatus === 'inactive') filtered = filtered.filter(s => !s.is_active);

    // Search
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      filtered = filtered.filter(s =>
        (s.project_code || '').toLowerCase().includes(q) ||
        (s.name         || '').toLowerCase().includes(q) ||
        (s.client       || '').toLowerCase().includes(q) ||
        (s.region       || '').toLowerCase().includes(q)
      );
    }

    if (filtered.length === 0) {
      body.innerHTML = '<tr class="empty-row"><td colspan="7">Δεν βρέθηκαν εργοτάξια</td></tr>';
      return;
    }

    body.innerHTML = filtered.map(s => `
      <tr onclick="window.location.href='admin-site-edit.html?id=${s.id}'">
        <td class="td-code">${esc(s.project_code)}</td>
        <td class="td-name">${esc(s.name)}</td>
        <td class="td-client">${esc(s.client || '—')}</td>
        <td class="td-region">${esc(s.region || '—')}</td>
        <td class="td-date">${fmtDate(s.start_date)}</td>
        <td class="center"><span class="badge ${s.is_active ? 'badge-active' : 'badge-inactive'}">${s.is_active ? 'Ενεργό' : 'Ανενεργό'}</span></td>
        <td class="td-actions" onclick="event.stopPropagation()">
          <button class="btn-edit" onclick="window.location.href='admin-site-edit.html?id=${s.id}'">Επεξ.</button>
        </td>
      </tr>`
    ).join('');
  }

  // ── HELPERS ──
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('el-GR', { day:'2-digit', month:'2-digit', year:'numeric' });
  }
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { t.className = 'toast'; }, 3500);
  }

  // ── FILTER TOGGLE ──
  document.querySelectorAll('.filter-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterStatus = btn.dataset.filter;
      renderTable();
    });
  });

  // ── SEARCH ──
  document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value.trim();
    renderTable();
  });

  // Check for success message from edit page
  const params = new URLSearchParams(window.location.search);
  if (params.get('saved') === '1') showToast('Το εργοτάξιο αποθηκεύτηκε επιτυχώς.');
  if (params.get('saved') === 'new') showToast('Νέο εργοτάξιο δημιουργήθηκε επιτυχώς.');

  await loadSites();

})();
</script>
</body>
</html>
