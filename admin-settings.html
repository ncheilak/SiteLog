<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteLog — Ρυθμίσεις Εταιρείας</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black:#0c0c0c; --yellow:#f5c800; --yellow-dk:#c9a000; --yellow-dim:rgba(245,200,0,0.08);
    --orange:#e8600a; --white:#f0ebe0; --gray:#181818; --gray2:#222; --gray3:#2e2e2e;
    --gray4:#444; --gray5:#666; --green:#1fa644; --red:#e53e3e;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--black); color:var(--white); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

  /* HEADER */
  header { background:var(--yellow); color:var(--black); padding:0 28px; height:54px; display:flex; align-items:center; justify-content:space-between; border-bottom:4px solid var(--orange); position:sticky; top:0; z-index:200; gap:12px; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:3px; flex-shrink:0; }
  .logo em { color:var(--orange); font-style:normal; }
  .logo sub { font-size:0.6rem; letter-spacing:1px; opacity:.55; vertical-align:middle; margin-left:7px; font-family:'IBM Plex Mono',monospace; font-weight:600; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .user-name { font-size:0.82rem; font-weight:600; }
  .btn-signout { background:var(--black); color:var(--yellow); border:none; border-radius:2px; font-family:'IBM Plex Mono',monospace; font-size:0.58rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; padding:7px 12px; cursor:pointer; }
  .btn-signout:hover { opacity:.8; }

  /* PAGE */
  .page { flex:1; padding:36px 28px 80px; max-width:720px; width:100%; margin:0 auto; }

  /* BREADCRUMB */
  .breadcrumb { display:flex; align-items:center; gap:8px; font-family:'IBM Plex Mono',monospace; font-size:0.6rem; letter-spacing:1px; color:var(--gray5); margin-bottom:28px; }
  .breadcrumb a { color:var(--gray5); text-decoration:none; transition:color .15s; }
  .breadcrumb a:hover { color:var(--yellow); }
  .breadcrumb span { color:var(--gray4); }

  /* PAGE HEADER */
  .page-header { margin-bottom:32px; }
  .page-title { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:4px; color:var(--white); line-height:1; }
  .page-title span { color:var(--yellow); }
  .page-subtitle { font-size:0.8rem; color:var(--gray5); margin-top:8px; line-height:1.6; }

  /* FORM SECTIONS */
  .form-section { background:var(--gray); border:1px solid var(--gray3); border-radius:3px; overflow:hidden; margin-bottom:20px; }
  .section-header { background:var(--gray2); border-bottom:1px solid var(--gray3); padding:12px 20px; }
  .section-title { font-family:'IBM Plex Mono',monospace; font-size:0.62rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--gray5); }
  .section-body { padding:20px; }

  /* FIELDS */
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  .field-row.single { grid-template-columns:1fr; }
  .field-row:last-child { margin-bottom:0; }
  .field { display:flex; flex-direction:column; gap:6px; }
  label { font-family:'IBM Plex Mono',monospace; font-size:0.6rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray5); }
  input[type=text], input[type=email], input[type=url], input[type=tel] {
    background:var(--gray2); border:1px solid var(--gray3); border-radius:2px;
    color:var(--white); font-family:'IBM Plex Sans',sans-serif; font-size:0.9rem;
    padding:10px 14px; outline:none; transition:border-color .18s; width:100%;
  }
  input:focus { border-color:var(--yellow); }
  input::placeholder { color:var(--gray4); }

  /* ACTIONS */
  .actions { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .btn-save { display:inline-flex; align-items:center; gap:8px; background:var(--yellow); color:var(--black); border:none; border-radius:2px; font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:2px; padding:12px 22px; cursor:pointer; transition:background .18s; }
  .btn-save:hover:not(:disabled) { background:var(--yellow-dk); }
  .btn-save:disabled { opacity:.5; cursor:not-allowed; }
  .btn-cancel { background:none; border:1px solid var(--gray3); border-radius:2px; color:var(--gray5); font-family:'IBM Plex Mono',monospace; font-size:0.65rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; padding:12px 18px; cursor:pointer; text-decoration:none; transition:border-color .15s,color .15s; display:inline-flex; align-items:center; }
  .btn-cancel:hover { border-color:var(--white); color:var(--white); }

  /* SPINNER */
  .spinner { width:15px; height:15px; border:2px solid rgba(0,0,0,.3); border-top-color:var(--black); border-radius:50%; animation:spin .7s linear infinite; display:none; }
  .btn-save.loading .spinner { display:block; }
  .btn-save.loading .btn-text { display:none; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* MSG */
  .msg { padding:11px 16px; border-radius:2px; font-size:0.82rem; margin-bottom:16px; display:none; line-height:1.5; }
  .msg.error   { background:rgba(229,62,62,.12); border:1px solid rgba(229,62,62,.35); color:#fc8181; display:block; }
  .msg.success { background:rgba(31,166,68,.12); border:1px solid rgba(31,166,68,.35); color:#68d391; display:block; }

  /* LOADING SKELETON */
  .skeleton-line { height:40px; background:var(--gray2); border-radius:2px; animation:shimmer 1.4s infinite; }
  @keyframes shimmer { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }

  footer { border-top:1px solid var(--gray3); padding:16px 28px; }
  .footer-logo { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:3px; color:var(--gray4); }
  .footer-logo em { color:var(--orange); font-style:normal; }

  @media(max-width:600px) { .field-row { grid-template-columns:1fr; } .page { padding:24px 16px 60px; } }
</style>
</head>
<body>

<header>
  <div class="logo">Site<em>Log</em><sub>v3.0</sub></div>
  <div class="header-right">
    <span class="user-name" id="userName"></span>
    <button class="btn-signout" id="signOutBtn">Έξοδος</button>
  </div>
</header>

<div class="page">

  <div class="breadcrumb">
    <a href="index.html">Αρχική</a>
    <span>›</span>
    <span>Ρυθμίσεις Εταιρείας</span>
  </div>

  <div class="page-header">
    <div class="page-title">ΡΥΘΜΙΣΕΙΣ <span>ΕΤΑΙΡΕΙΑΣ</span></div>
    <div class="page-subtitle">
      Τα στοιχεία αυτά εμφανίζονται στο ΣΕΠΕ Ημερήσιο Παρουσιολόγιο και σε κάθε επίσημο έντυπο του συστήματος.
    </div>
  </div>

  <div class="msg" id="topMsg"></div>

  <!-- SECTION 1: Ταυτότητα -->
  <div class="form-section">
    <div class="section-header"><div class="section-title">Ταυτότητα Εταιρείας</div></div>
    <div class="section-body">
      <div class="field-row single">
        <div class="field">
          <label>Επωνυμία Εταιρείας</label>
          <input type="text" id="fCompanyName" placeholder="π.χ. ΤΕΧΝΙΚΗ ΚΑΤΑΣΚΕΥΑΣΤΙΚΗ ΑΕ" maxlength="150">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>ΑΦΜ Εταιρείας</label>
          <input type="text" id="fCompanyAfm" placeholder="π.χ. 123456789" maxlength="20">
        </div>
        <div class="field"></div>
      </div>
    </div>
  </div>

  <!-- SECTION 2: Επικοινωνία -->
  <div class="form-section">
    <div class="section-header"><div class="section-title">Στοιχεία Επικοινωνίας</div></div>
    <div class="section-body">
      <div class="field-row single">
        <div class="field">
          <label>Διεύθυνση</label>
          <input type="text" id="fCompanyAddress" placeholder="π.χ. Λεωφ. Αθηνών 100, 10441 Αθήνα" maxlength="200">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Τηλέφωνο</label>
          <input type="tel" id="fCompanyPhone" placeholder="π.χ. 210 1234567" maxlength="30">
        </div>
        <div class="field">
          <label>Email Επικοινωνίας</label>
          <input type="email" id="fCompanyEmail" placeholder="π.χ. info@company.gr" maxlength="100">
        </div>
      </div>
      <div class="field-row single">
        <div class="field">
          <label>Ιστοσελίδα</label>
          <input type="url" id="fCompanyWebsite" placeholder="π.χ. https://www.company.gr" maxlength="150">
        </div>
      </div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn-save" id="saveBtn">
      <div class="spinner"></div>
      <span class="btn-text">Αποθήκευση</span>
    </button>
    <a class="btn-cancel" href="index.html">Ακύρωση</a>
  </div>

</div>

<footer>
  <div class="footer-logo">Site<em>Log</em></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/auth.js"></script>
<script>
(async () => {

  const ok = await Auth.requireRole(['admin']);
  if (!ok) return;

  const sb = window.sb;
  document.getElementById('userName').textContent = Auth.getCurrentUser().full_name;
  document.getElementById('signOutBtn').addEventListener('click', () => Auth.signOut());

  // ── FIELDS MAP ──
  // key στη settings table → element id
  const FIELDS = {
    company_name:    'fCompanyName',
    company_afm:     'fCompanyAfm',
    company_address: 'fCompanyAddress',
    company_phone:   'fCompanyPhone',
    company_email:   'fCompanyEmail',
    company_website: 'fCompanyWebsite',
  };

  // ── LOAD ──
  const { data, error } = await sb
    .from('settings')
    .select('key, value')
    .in('key', Object.keys(FIELDS));

  if (error) {
    showMsg('Σφάλμα φόρτωσης ρυθμίσεων: ' + error.message, 'error');
  } else {
    (data || []).forEach(({ key, value }) => {
      const el = document.getElementById(FIELDS[key]);
      if (el) el.value = value || '';
    });
  }

  // ── SAVE ──
  document.getElementById('saveBtn').addEventListener('click', async () => {
    setLoading(true);
    document.getElementById('topMsg').className = 'msg';

    // Upsert όλα τα key-value pairs
    const upsertRows = Object.entries(FIELDS).map(([key, elId]) => ({
      key,
      value: document.getElementById(elId).value.trim() || null,
    }));

    const { error: saveErr } = await sb
      .from('settings')
      .upsert(upsertRows, { onConflict: 'key' });

    setLoading(false);

    if (saveErr) {
      showMsg('Σφάλμα αποθήκευσης: ' + saveErr.message, 'error');
    } else {
      showMsg('✓ Οι ρυθμίσεις αποθηκεύτηκαν επιτυχώς.', 'success');
    }
  });

  // ── HELPERS ──
  function showMsg(text, type) {
    const el = document.getElementById('topMsg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function setLoading(val) {
    const btn = document.getElementById('saveBtn');
    btn.disabled = val;
    btn.classList.toggle('loading', val);
  }

  // Enter key
  document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('saveBtn').click();
    });
  });

})();
</script>
</body>
</html>
