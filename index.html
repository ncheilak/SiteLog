<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteLog — Κεντρική Σελίδα</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #0c0c0c;
    --yellow:   #f5c800;
    --yellow-dk:#c9a000;
    --yellow-dim:rgba(245,200,0,0.08);
    --orange:   #e8600a;
    --white:    #f0ebe0;
    --gray:     #181818;
    --gray2:    #222;
    --gray3:    #2e2e2e;
    --gray4:    #444;
    --gray5:    #666;
    --green:    #1fa644;
    --blue:     #3b82f6;
    --red:      #e53e3e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--yellow);
    color: var(--black);
    padding: 0 28px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 4px solid var(--orange);
    position: sticky;
    top: 0;
    z-index: 200;
    flex-shrink: 0;
    gap: 12px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    letter-spacing: 3px;
    flex-shrink: 0;
  }
  .logo em { color: var(--orange); font-style: normal; }
  .logo sub {
    font-size: 0.6rem;
    letter-spacing: 1px;
    opacity: 0.55;
    vertical-align: middle;
    margin-left: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
  }

  /* ── USER MENU ── */
  .user-menu {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .user-info {
    text-align: right;
    line-height: 1.3;
  }
  .user-name {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--black);
  }
  .user-role {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.55rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--orange);
  }
  .btn-signout {
    background: var(--black);
    color: var(--yellow);
    border: none;
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 12px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-signout:hover { opacity: 0.8; }

  /* ── ADHOC BADGE ── */
  .adhoc-badge {
    display: none;
    background: var(--red);
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 10px;
    white-space: nowrap;
    animation: badgePulse 2s ease-in-out infinite;
    cursor: pointer;
  }
  @keyframes badgePulse {
    0%,100%{ opacity:1; }
    50%{ opacity:0.65; }
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    padding: 46px 28px 38px;
    border-bottom: 1px solid var(--gray3);
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -55deg, transparent, transparent 18px,
      rgba(245,200,0,0.025) 18px, rgba(245,200,0,0.025) 19px
    );
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: var(--orange);
  }
  .hero-inner { position: relative; max-width: 820px; }
  .hero-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hero-label::before {
    content: '';
    display: inline-block;
    width: 28px; height: 2px;
    background: var(--orange);
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    letter-spacing: 4px;
    line-height: 1;
    color: var(--white);
    margin-bottom: 6px;
  }
  .hero h1 span { color: var(--yellow); }
  .hero-sub {
    font-size: 0.87rem;
    color: var(--gray5);
    margin-top: 12px;
    line-height: 1.65;
    max-width: 520px;
  }

  /* ── SECTIONS ── */
  .tools-section {
    flex: 1;
    padding: 40px 28px 64px;
  }
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray5);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gray3);
  }

  /* ── GRID ── */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--gray3);
    border: 1px solid var(--gray3);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 36px;
  }
  .tools-grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
  .tools-grid.grid-2 { grid-template-columns: repeat(2, 1fr); }
  .tools-grid.grid-1 { grid-template-columns: 1fr; }

  @media (max-width: 1000px) { .tools-grid { grid-template-columns: repeat(2, 1fr) !important; } }
  @media (max-width: 500px)  { .tools-grid { grid-template-columns: 1fr !important; } }
  @media (max-width: 600px)  { .hero { padding: 30px 20px 24px; } .tools-section { padding: 24px 20px 40px; } }

  /* ── TOOL CARD ── */
  .tool-card {
    background: var(--gray);
    display: flex;
    flex-direction: column;
    padding: 26px 22px 22px;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
    transition: background 0.18s;
    cursor: pointer;
  }
  .tool-card.disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }
  .tool-card:hover { background: var(--gray2); }
  .tool-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--yellow));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.22s ease;
  }
  .tool-card:hover::before { transform: scaleX(1); }

  .card-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    line-height: 1;
    color: var(--gray3);
    position: absolute;
    top: 14px; right: 16px;
    letter-spacing: 2px;
    user-select: none;
    transition: color 0.18s, opacity 0.18s;
  }
  .tool-card:hover .card-num { color: var(--card-accent, var(--yellow)); opacity: 0.18; }

  .card-icon {
    width: 42px; height: 42px;
    border-radius: 2px;
    background: var(--yellow-dim);
    border: 1px solid var(--gray3);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    font-size: 1.25rem;
    transition: background 0.18s, border-color 0.18s;
  }
  .tool-card:hover .card-icon {
    background: rgba(245,200,0,0.13);
    border-color: var(--card-accent, var(--yellow));
  }

  .card-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.55rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--card-accent, var(--yellow));
    margin-bottom: 7px;
  }
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 10px;
    line-height: 1.1;
  }
  .card-desc {
    font-size: 0.78rem;
    color: var(--gray5);
    line-height: 1.65;
    flex: 1;
    margin-bottom: 18px;
  }
  .card-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 2px;
    color: var(--black);
    background: var(--card-accent, var(--yellow));
    padding: 8px 14px;
    border-radius: 2px;
    align-self: flex-start;
    transition: opacity 0.15s;
    margin-top: auto;
  }
  .card-cta:hover { opacity: 0.88; }
  .card-cta svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* ── SITE CHIP (για non-admin) ── */
  .site-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
    margin-bottom: 18px;
  }
  .site-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 1px;
    background: var(--yellow-dim);
    border: 1px solid rgba(245,200,0,0.2);
    color: var(--yellow);
    padding: 4px 10px;
    border-radius: 2px;
  }
  .no-site-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: var(--orange);
    background: rgba(232,96,10,0.08);
    border: 1px solid rgba(232,96,10,0.2);
    border-radius: 2px;
    padding: 12px 16px;
    margin-bottom: 22px;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--gray3);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .footer-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--gray4);
  }
  .footer-logo em { color: var(--orange); font-style: normal; }
  .footer-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 1px;
    color: var(--gray5);
    text-align: right;
  }

  /* ── PULSE DOT ── */
  .pulse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    flex-shrink: 0;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.45; transform:scale(0.7); }
  }

  /* ── ENTRY ANIMATION ── */
  .tool-card { animation: cardIn 0.4s ease both; }
  .tool-card:nth-child(1){ animation-delay:0.04s; }
  .tool-card:nth-child(2){ animation-delay:0.10s; }
  .tool-card:nth-child(3){ animation-delay:0.16s; }
  .tool-card:nth-child(4){ animation-delay:0.22s; }
  @keyframes cardIn {
    from{ opacity:0; transform:translateY(12px); }
    to  { opacity:1; transform:translateY(0); }
  }

  /* ── SKELETON LOADING ── */
  .skeleton {
    background: linear-gradient(90deg, var(--gray) 25%, var(--gray2) 50%, var(--gray) 75%);
    background-size: 400% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 2px;
  }
  @keyframes shimmer { to { background-position: -400% 0; } }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Site<em>Log</em><sub>v3.0</sub></div>

  <div class="user-menu">
    <!-- Adhoc pending badge — εμφανίζεται μόνο σε admin -->
    <span class="adhoc-badge" id="adhocBadge" onclick="window.location.href='admin-adhoc-queue.html'"></span>

    <div class="user-info">
      <div class="user-name" id="userName">…</div>
      <div class="user-role" id="userRole">…</div>
    </div>
    <button class="btn-signout" id="signOutBtn">Έξοδος</button>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-label">Κεντρική Πρόσβαση</div>
    <h1>ΕΠΙΛΕΞΤΕ <span>ΕΡΓΑΛΕΙΟ</span></h1>
    <p class="hero-sub" id="heroSub">
      Πλήρες σύστημα καταγραφής παρουσίας για εργοτάξια.
    </p>
  </div>
</div>

<!-- TOOLS -->
<div class="tools-section">

  <!-- No site message (για users χωρίς assignment) -->
  <div id="noSiteMsg" class="no-site-msg" style="display:none;">
    ⚠️ Δεν έχεις ανάθεση σε εργοτάξιο ακόμα. Επικοινώνησε με τον διαχειριστή.
  </div>

  <!-- Site chips (εμφανίζεται σε non-admin) -->
  <div id="siteChips" class="site-chips" style="display:none;"></div>

  <!-- ── ΚΥΡΙΑ ΕΡΓΑΛΕΙΑ ── -->
  <div class="section-label" id="mainLabel">Εργαλεία</div>
  <div class="tools-grid" id="mainGrid">
    <!-- Ενημερώνεται δυναμικά -->
  </div>

  <!-- ── ADMIN PANEL ── (εμφανίζεται μόνο σε admin + project_manager) -->
  <div id="adminSection" style="display:none;">
    <div class="section-label">Διαχείριση</div>
    <div class="tools-grid" id="adminGrid">
      <!-- Ενημερώνεται δυναμικά -->
    </div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">Site<em>Log</em></div>
  <div class="footer-note" id="footerNote">v3.0</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/auth.js"></script>
<script>
(async () => {

  // ── Auth guard ──
  const ok = await Auth.requireLogin();
  if (!ok) return;

  const user   = Auth.getCurrentUser();
  const role   = Auth.getCurrentRole();
  const sites  = Auth.getAssignedSites();
  const roleLabel = Auth.getRoleLabel();

  // ── Header ──
  document.getElementById('userName').textContent = user.full_name;
  document.getElementById('userRole').textContent = roleLabel;
  document.getElementById('signOutBtn').addEventListener('click', () => Auth.signOut());

  // ── Hero sub ──
  const heroSub = document.getElementById('heroSub');
  const greetings = { admin: 'Πλήρης πρόσβαση σε όλα τα εργαλεία και τον πίνακα διαχείρισης.', project_manager: 'Εποπτεία εργοταξίων και διαχείριση αναθέσεων.', site_manager: 'Διαχείριση παρουσιών και εργαζομένων για το εργοτάξιό σου.', scanner: 'Σάρωση QR και καταγραφή παρουσιών σε πραγματικό χρόνο.' };
  heroSub.textContent = greetings[role] || '';

  // ── Site chips (για non-admin) ──
  if (role !== 'admin') {
    if (sites.length === 0) {
      document.getElementById('noSiteMsg').style.display = 'block';
    } else {
      const chipsEl = document.getElementById('siteChips');
      chipsEl.style.display = 'flex';
      sites.forEach(s => {
        const chip = document.createElement('span');
        chip.className = 'site-chip';
        chip.textContent = s.project_code + ' · ' + s.name;
        chipsEl.appendChild(chip);
      });
    }
  }

  // ── Arrow SVG ──
  const arrowSvg = `<svg viewBox="0 0 16 16" fill="none"><path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;

  function makeCard({ href, num, icon, tag, accentVar, accentColor, title, desc, ctaColor }) {
    const a = document.createElement('a');
    a.className = 'tool-card';
    a.href = href;
    if (accentVar) a.style.setProperty('--card-accent', `var(${accentVar})`);
    a.innerHTML = `
      <div class="card-num">${num}</div>
      <div class="card-icon">${icon}</div>
      <div class="card-tag">${tag}</div>
      <div class="card-title">${title}</div>
      <p class="card-desc">${desc}</p>
      <span class="card-cta" ${accentColor ? `style="background:${accentColor};color:#fff;"` : ''}>
        Άνοιγμα ${arrowSvg}
      </span>`;
    return a;
  }

  // ── DEFINITIONS ──
  const allMainCards = {
    worker_compiler: {
      roles: ['admin', 'site_manager'],
      card: { href:'0-worker-compiler-gr.html', num:'01', icon:'👷', tag:'Βάση Δεδομένων', accentVar:'--yellow', title:'Καταχώρηση Εργαζομένων', desc:'Εισαγωγή και διαχείριση λίστας εργαζομένων με όλα τα απαραίτητα στοιχεία.', ctaColor:null },
    },
    qr_generator: {
      roles: ['admin', 'site_manager'],
      card: { href:'1-qr-generator-gr.html', num:'02', icon:'🪪', tag:'QR Badges', accentVar:null, accentColor:'#e8600a', title:'QR Generator', desc:'Αναζήτηση εργαζομένων και δημιουργία QR badges για check-in στο εργοτάξιο.' },
    },
    scanner: {
      roles: ['admin', 'site_manager', 'scanner'],
      card: { href:'3-scanner-app-gr.html', num:'03', icon:'📷', tag:'Παρουσία', accentColor:'#1fa644', title:'Σαρωτής QR', desc:'Σάρωση QR badge για καταγραφή εισόδου εργαζομένων σε πραγματικό χρόνο.' },
    },
    attendance: {
      roles: ['admin', 'project_manager', 'site_manager', 'scanner'],
      card: { href:'2-attendance-gr.html', num:'04', icon:'📋', tag:'Αναφορές', accentColor:'#3b82f6', title:'Παρουσιολόγιο', desc:'Προβολή αρχείου παρουσιών με πλήρη στοιχεία εργαζομένων και εξαγωγή CSV.' },
    },
    reports: {
      roles: ['admin', 'project_manager', 'site_manager'],
      card: { href:'reports.html', num:'05', icon:'📊', tag:'Αναφορές', accentColor:'#8b5cf6', title:'Εργατοημέρες', desc:'Συγκεντρωτική αναφορά εργατοημερών ανά εργολάβο και μήνα με εξαγωγή CSV.' },
    },
    site_diary: {
      roles: ['admin', 'project_manager', 'site_manager'],
      card: { href:'site-diary.html', num:'06', icon:'📅', tag:'Ημερολόγιο', accentColor:'#0f9e75', title:'Ημερολόγιο Εργοταξίου', desc:'Καθημερινή καταγραφή εργασιών, καιρού, επισκέψεων και διακοπών ανά εργοτάξιο.' },
    },
  };

  const allAdminCards = {
    admin_sites: {
      roles: ['admin'],
      card: { href:'admin-sites.html', num:'A1', icon:'🏗️', tag:'Διαχείριση', accentVar:'--yellow', title:'Εργοτάξια', desc:'Δημιουργία, επεξεργασία και διαχείριση εργοταξίων.' },
    },
    admin_company: {
      roles: ['admin'],
      card: { href:'admin-company-workers.html', num:'A2', icon:'🧑‍💼', tag:'Εταιρικοί', accentVar:'--yellow', title:'Υπάλληλοι Εταιρείας', desc:'Διαχείριση εταιρικών υπαλλήλων — πηγή για δημιουργία user accounts.' },
    },
    admin_users: {
      roles: ['admin', 'project_manager'],
      card: { href:'admin-users.html', num:'A3', icon:'👤', tag:'Χρήστες', accentVar:'--yellow', title:'Χρήστες & Αναθέσεις', desc:'Δημιουργία users, ορισμός ρόλων και ανάθεση σε εργοτάξια.' },
    },
    admin_adhoc: {
      roles: ['admin'],
      card: { href:'admin-adhoc-queue.html', num:'A4', icon:'⚠️', tag:'Έκτακτοι', accentColor:'#e8600a', title:'Έκτακτοι Εργαζόμενοι', desc:'Έγκριση ή απόρριψη έκτακτων εγγραφών από τα εργοτάξια.' },
    },
    admin_settings: {
      roles: ['admin'],
      card: { href:'admin-settings.html', num:'A5', icon:'🏢', tag:'Ρυθμίσεις', accentVar:'--yellow', title:'Στοιχεία Εταιρείας', desc:'Επωνυμία, ΑΦΜ, διεύθυνση και στοιχεία επικοινωνίας για τα επίσημα έντυπα.' },
    },
  };

  // ── RENDER MAIN GRID ──
  const mainGrid = document.getElementById('mainGrid');
  let mainCount = 0;
  Object.values(allMainCards).forEach(({ roles, card }) => {
    if (roles.includes(role)) {
      mainGrid.appendChild(makeCard(card));
      mainCount++;
    }
  });
  if (mainCount === 0) mainGrid.innerHTML = '<div style="padding:28px;color:var(--gray5);font-size:0.8rem;">Δεν υπάρχουν διαθέσιμα εργαλεία για τον ρόλο σου.</div>';
  // adjust grid columns
  if (mainCount <= 2) mainGrid.classList.add('grid-' + mainCount);
  else if (mainCount === 3) mainGrid.classList.add('grid-3');

  // ── RENDER ADMIN GRID ──
  const adminSection = document.getElementById('adminSection');
  const adminGrid    = document.getElementById('adminGrid');
  let adminCount = 0;
  Object.values(allAdminCards).forEach(({ roles, card }) => {
    if (roles.includes(role)) {
      adminGrid.appendChild(makeCard(card));
      adminCount++;
    }
  });
  if (adminCount > 0) {
    adminSection.style.display = 'block';
    if (adminCount <= 2) adminGrid.classList.add('grid-' + adminCount);
    else if (adminCount === 3) adminGrid.classList.add('grid-3');
  }

  // ── ADHOC BADGE (μόνο admin) ──
  if (role === 'admin') {
    const { count } = await sb
      .from('adhoc_workers')
      .select('*', { count: 'exact', head: true })
      .eq('status', 'pending');
    if (count > 0) {
      const badge = document.getElementById('adhocBadge');
      badge.style.display = 'inline-block';
      badge.textContent = count + ' ΕΚΤΑΚΤΟΙ';
    }
  }

  // ── FOOTER ──
  document.getElementById('footerNote').textContent =
    'SiteLog v3.0 · ' + roleLabel + ' · ' + user.email;

})();
</script>
</body>
</html>
