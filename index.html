<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteLog — Κεντρική Σελίδα</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/theme.css">
<style>
  /* ── PAGE-SPECIFIC ── */

  body { display: flex; flex-direction: column; }

  /* HERO */
  .hero {
    position: relative;
    padding: 46px 28px 38px;
    border-bottom: 1px solid var(--gray3);
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -55deg, transparent, transparent 18px,
      rgba(245,200,0,0.025) 18px, rgba(245,200,0,0.025) 19px
    );
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: var(--orange);
  }
  .hero-inner { position: relative; max-width: 820px; }
  .hero-label {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hero-label::before {
    content: '';
    display: inline-block;
    width: 28px; height: 2px;
    background: var(--orange);
  }
  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--white);
    margin-bottom: 6px;
  }
  .hero h1 span { color: var(--yellow); }
  .hero-sub {
    font-size: 0.87rem;
    color: var(--gray5);
    margin-top: 12px;
    line-height: 1.65;
    max-width: 520px;
  }

  /* TOOLS */
  .tools-section { flex: 1; padding: 40px 28px 64px; }

  .site-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; margin-bottom: 18px; }

  .no-site-msg {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: var(--orange);
    background: var(--orange-dim);
    border: 1px solid rgba(232,96,10,0.2);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 22px;
  }

  /* GRID */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--gray3);
    border: 1px solid var(--gray3);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 36px;
  }
  .tools-grid.grid-3 { grid-template-columns: repeat(3, 1fr); }
  .tools-grid.grid-2 { grid-template-columns: repeat(2, 1fr); }
  .tools-grid.grid-1 { grid-template-columns: 1fr; }

  @media (max-width: 1000px) { .tools-grid { grid-template-columns: repeat(2, 1fr) !important; } }
  @media (max-width: 500px)  { .tools-grid { grid-template-columns: 1fr !important; } }
  @media (max-width: 600px)  {
    .hero { padding: 30px 20px 24px; }
    .tools-section { padding: 24px 20px 40px; }
  }

  /* TOOL CARD */
  .tool-card {
    background: var(--gray);
    display: flex;
    flex-direction: column;
    padding: 26px 22px 22px;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
    transition: background var(--t-base);
    cursor: pointer;
    animation: cardIn 0.4s ease both;
  }
  .tool-card.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
  .tool-card:hover { background: var(--gray2); }
  .tool-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--yellow));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.22s ease;
  }
  .tool-card:hover::before { transform: scaleX(1); }
  .tool-card:nth-child(1){ animation-delay:0.04s; }
  .tool-card:nth-child(2){ animation-delay:0.10s; }
  .tool-card:nth-child(3){ animation-delay:0.16s; }
  .tool-card:nth-child(4){ animation-delay:0.22s; }

  .card-num {
    font-family: var(--font-display);
    font-size: 3rem;
    line-height: 1;
    color: var(--gray3);
    position: absolute;
    top: 14px; right: 16px;
    letter-spacing: -0.02em;
    user-select: none;
    transition: color var(--t-base), opacity var(--t-base);
  }
  .tool-card:hover .card-num { color: var(--card-accent, var(--yellow)); opacity: 0.18; }

  .card-icon {
    width: 42px; height: 42px;
    border-radius: var(--radius);
    background: var(--yellow-dim);
    border: 1px solid var(--gray3);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    font-size: 1.25rem;
    transition: background var(--t-base), border-color var(--t-base);
  }
  .tool-card:hover .card-icon {
    background: rgba(245,200,0,0.13);
    border-color: var(--card-accent, var(--yellow));
  }
  .card-tag {
    font-family: var(--font-mono);
    font-size: 0.55rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--card-accent, var(--yellow));
    margin-bottom: 7px;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 1.3rem;
    letter-spacing: -0.02em;
    color: var(--white);
    margin-bottom: 10px;
    line-height: 1.1;
  }
  .card-desc {
    font-size: 0.78rem;
    color: var(--gray5);
    line-height: 1.65;
    flex: 1;
    margin-bottom: 18px;
  }
  .card-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-display);
    font-size: 0.9rem;
    letter-spacing: -0.01em;
    color: var(--black);
    background: var(--card-accent, var(--yellow));
    padding: 8px 14px;
    border-radius: var(--radius);
    align-self: flex-start;
    transition: opacity var(--t-fast);
    margin-top: auto;
  }
  .card-cta:hover { opacity: 0.88; }
  .card-cta svg { width: 13px; height: 13px; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="logo">Site<em>Log</em><sub>v3.0</sub></div>
  <div class="user-menu">
    <span class="adhoc-badge" id="adhocBadge" onclick="window.location.href='admin-adhoc-queue.html'"></span>
    <div class="user-info">
      <div class="user-name" id="userName">…</div>
      <div class="user-role" id="userRole">…</div>
    </div>
    <button class="btn-signout" id="signOutBtn">Έξοδος</button>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-label">Κεντρική Πρόσβαση</div>
    <h1>ΕΠΙΛΕΞΤΕ <span>ΕΡΓΑΛΕΙΟ</span></h1>
    <p class="hero-sub" id="heroSub">Πλήρες σύστημα καταγραφής παρουσίας για εργοτάξια.</p>
  </div>
</div>

<div class="tools-section">
  <div id="noSiteMsg" class="no-site-msg" style="display:none;">
    ⚠️ Δεν έχεις ανάθεση σε εργοτάξιο ακόμα. Επικοινώνησε με τον διαχειριστή.
  </div>
  <div id="siteChips" class="site-chips" style="display:none;"></div>

  <div class="section-label" id="mainLabel">Εργαλεία</div>
  <div class="tools-grid" id="mainGrid"></div>

  <div id="adminSection" style="display:none;">
    <div class="section-label">Διαχείριση</div>
    <div class="tools-grid" id="adminGrid"></div>
  </div>
</div>

<footer>
  <div class="footer-logo">Site<em>Log</em></div>
  <div class="footer-note" id="footerNote">v3.0</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/auth.js"></script>
<script>
(async () => {
  const ok = await Auth.requireLogin();
  if (!ok) return;

  const user      = Auth.getCurrentUser();
  const role      = Auth.getCurrentRole();
  const sites     = Auth.getAssignedSites();
  const roleLabel = Auth.getRoleLabel();

  document.getElementById('userName').textContent = user.full_name;
  document.getElementById('userRole').textContent = roleLabel;
  document.getElementById('signOutBtn').addEventListener('click', () => Auth.signOut());

  const greetings = {
    admin:           'Πλήρης πρόσβαση σε όλα τα εργαλεία και τον πίνακα διαχείρισης.',
    project_manager: 'Εποπτεία εργοταξίων και διαχείριση αναθέσεων.',
    site_manager:    'Διαχείριση παρουσιών και εργαζομένων για το εργοτάξιό σου.',
    scanner:         'Σάρωση QR και καταγραφή παρουσιών σε πραγματικό χρόνο.',
  };
  document.getElementById('heroSub').textContent = greetings[role] || '';

  if (role !== 'admin') {
    if (sites.length === 0) {
      document.getElementById('noSiteMsg').style.display = 'block';
    } else {
      const chipsEl = document.getElementById('siteChips');
      chipsEl.style.display = 'flex';
      sites.forEach(s => {
        const chip = document.createElement('span');
        chip.className = 'site-chip';
        chip.textContent = s.project_code + ' · ' + s.name;
        chipsEl.appendChild(chip);
      });
    }
  }

  const arrowSvg = `<svg viewBox="0 0 16 16" fill="none"><path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;

  function makeCard({ href, num, icon, tag, accentVar, accentColor, title, desc, ctaColor }) {
    const a = document.createElement('a');
    a.className = 'tool-card';
    a.href = href;
    if (accentVar) a.style.setProperty('--card-accent', `var(${accentVar})`);
    a.innerHTML = `
      <div class="card-num">${num}</div>
      <div class="card-icon">${icon}</div>
      <div class="card-tag">${tag}</div>
      <div class="card-title">${title}</div>
      <p class="card-desc">${desc}</p>
      <span class="card-cta" ${accentColor ? `style="background:${accentColor};color:#fff;"` : ''}>
        Άνοιγμα ${arrowSvg}
      </span>`;
    return a;
  }

  const allMainCards = {
    worker_compiler: {
      roles: ['admin','site_manager'],
      card: { href:'0-worker-compiler-gr.html', num:'01', icon:'👷', tag:'Βάση Δεδομένων', accentVar:'--yellow', title:'Καταχώρηση Εργαζομένων', desc:'Εισαγωγή και διαχείριση λίστας εργαζομένων με όλα τα απαραίτητα στοιχεία.' },
    },
    qr_generator: {
      roles: ['admin','site_manager'],
      card: { href:'1-qr-generator-gr.html', num:'02', icon:'🪪', tag:'QR Badges', accentVar:null, accentColor:'#e8600a', title:'QR Generator', desc:'Αναζήτηση εργαζομένων και δημιουργία QR badges για check-in στο εργοτάξιο.' },
    },
    scanner: {
      roles: ['admin','site_manager','scanner'],
      card: { href:'3-scanner-app-gr.html', num:'03', icon:'📷', tag:'Παρουσία', accentColor:'#22c55e', title:'Σαρωτής QR', desc:'Σάρωση QR badge για καταγραφή εισόδου εργαζομένων σε πραγματικό χρόνο.' },
    },
    attendance: {
      roles: ['admin','project_manager','site_manager','scanner'],
      card: { href:'2-attendance-gr.html', num:'04', icon:'📋', tag:'Αναφορές', accentColor:'#3b82f6', title:'Παρουσιολόγιο', desc:'Προβολή αρχείου παρουσιών με πλήρη στοιχεία εργαζομένων και εξαγωγή CSV.' },
    },
    reports: {
      roles: ['admin','project_manager','site_manager'],
      card: { href:'reports.html', num:'05', icon:'📊', tag:'Αναφορές', accentColor:'#8b5cf6', title:'Εργατοημέρες', desc:'Συγκεντρωτική αναφορά εργατοημερών ανά εργολάβο και μήνα με εξαγωγή CSV.' },
    },
  };

  const allAdminCards = {
    admin_sites:   { roles:['admin'], card:{ href:'admin-sites.html', num:'A1', icon:'🏗️', tag:'Διαχείριση', accentVar:'--yellow', title:'Εργοτάξια', desc:'Δημιουργία, επεξεργασία και διαχείριση εργοταξίων.' } },
    admin_company: { roles:['admin'], card:{ href:'admin-company-workers.html', num:'A2', icon:'🧑‍💼', tag:'Εταιρικοί', accentVar:'--yellow', title:'Υπάλληλοι Εταιρείας', desc:'Διαχείριση εταιρικών υπαλλήλων — πηγή για δημιουργία user accounts.' } },
    admin_users:   { roles:['admin','project_manager'], card:{ href:'admin-users.html', num:'A3', icon:'👤', tag:'Χρήστες', accentVar:'--yellow', title:'Χρήστες & Αναθέσεις', desc:'Δημιουργία users, ορισμός ρόλων και ανάθεση σε εργοτάξια.' } },
    admin_adhoc:   { roles:['admin'], card:{ href:'admin-adhoc-queue.html', num:'A4', icon:'⚠️', tag:'Έκτακτοι', accentColor:'#e8600a', title:'Έκτακτοι Εργαζόμενοι', desc:'Έγκριση ή απόρριψη έκτακτων εγγραφών από τα εργοτάξια.' } },
    admin_settings:{ roles:['admin'], card:{ href:'admin-settings.html', num:'A5', icon:'🏢', tag:'Ρυθμίσεις', accentVar:'--yellow', title:'Στοιχεία Εταιρείας', desc:'Επωνυμία, ΑΦΜ, διεύθυνση και στοιχεία επικοινωνίας για τα επίσημα έντυπα.' } },
  };

  const mainGrid = document.getElementById('mainGrid');
  let mainCount = 0;
  Object.values(allMainCards).forEach(({ roles, card }) => {
    if (roles.includes(role)) { mainGrid.appendChild(makeCard(card)); mainCount++; }
  });
  if (mainCount === 0) mainGrid.innerHTML = '<div style="padding:28px;color:var(--gray5);font-size:0.8rem;">Δεν υπάρχουν διαθέσιμα εργαλεία για τον ρόλο σου.</div>';
  if (mainCount <= 2) mainGrid.classList.add('grid-' + mainCount);
  else if (mainCount === 3) mainGrid.classList.add('grid-3');

  const adminSection = document.getElementById('adminSection');
  const adminGrid    = document.getElementById('adminGrid');
  let adminCount = 0;
  Object.values(allAdminCards).forEach(({ roles, card }) => {
    if (roles.includes(role)) { adminGrid.appendChild(makeCard(card)); adminCount++; }
  });
  if (adminCount > 0) {
    adminSection.style.display = 'block';
    if (adminCount <= 2) adminGrid.classList.add('grid-' + adminCount);
    else if (adminCount === 3) adminGrid.classList.add('grid-3');
  }

  if (role === 'admin') {
    const { count } = await sb.from('adhoc_workers').select('*',{count:'exact',head:true}).eq('status','pending');
    if (count > 0) {
      const badge = document.getElementById('adhocBadge');
      badge.style.display = 'inline-block';
      badge.textContent = count + ' ΕΚΤΑΚΤΟΙ';
    }
  }

  document.getElementById('footerNote').textContent = 'SiteLog v3.0 · ' + roleLabel + ' · ' + user.email;
})();
</script>
</body>
</html>
