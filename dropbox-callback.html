<!DOCTYPE html>
<html lang="el">
<head><meta charset="UTF-8"><title>SiteLog — Dropbox Σύνδεση</title></head>
<body style="background:#0c0c0c;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;margin:0">
<script>
  (async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');
    const error = urlParams.get('error');

    if (code && window.opener) {
      window.opener.postMessage({ type: 'dropbox-code', code, state }, window.location.origin);
      window.close();
    } else if (error && window.opener) {
      window.opener.postMessage({ type: 'dropbox-error', error }, window.location.origin);
      window.close();
    } else {
      document.body.innerHTML = '<p style="color:#e53e3e">⚠ Η σύνδεση απέτυχε. Κλείστε το παράθυρο.</p>';
    }
  })();
</script>
</body>
</html>
