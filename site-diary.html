<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteLog — Ημερολόγιο Εργοταξίου</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/theme.css">
<link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<script src="shared/auth.js"></script>
<script src="shared/offline-sync.js"></script>
<script src="https://www.dropbox.com/static/api/2/dropins.js" id="dropboxjs" data-app-key="szydo67fl9prnzz"></script>
<style>
/* ... ΟΛΟ το υπάρχον CSS παραμένει ίδιο ... */
</style>
<script src="shared/toast.js"></script>
</head>
<body>
<!-- ... όλο το HTML παραμένει ίδιο μέχρι το footer ... -->
      <div class="report-footer">
        <button class="btn btn-outline btn-sm" id="addEntryBtn" onclick="showNewForm()" style="display:none">+ Νέα Καταχώρηση</button>
        <div class="report-footer-right">
          <span class="footer-ts" id="rFooterTs"></span>
          <span class="footer-ts">SiteLog v3.0</span>
          <span id="syncIndicator" style="font-family:'IBM Plex Mono',monospace;font-size:0.55rem;color:var(--gray4);margin-left:8px;">✓</span>
        </div>
      </div>
<!-- ... -->
<script>
// ... όλες οι υπάρχουσες συναρτήσεις παραμένουν ΙΔΙΕΣ, εκτός από την saveEntry ...
// ... και στην init() προσθέτουμε την κλήση του updateSyncIndicator ...

async function init() {
  const ok = await Auth.requireLogin();
  if (!ok) return;
  currentUser = Auth.getCurrentUser();
  currentRole = Auth.getCurrentRole();
  if (currentUser) {
    document.getElementById('userName').textContent = currentUser.full_name || currentUser.email;
    document.getElementById('userRoleLabel').textContent = Auth.getRoleLabel();
  }
  if (currentRole === 'scanner') {
    setStatus('err','⚠ Δεν έχετε πρόσβαση');
    document.querySelector('.day-section').innerHTML = '<div class="no-msg" style="color:var(--red)">Δεν έχετε δικαίωμα πρόσβασης.</div>';
    return;
  }
  quill = new Quill('#quillEditor', {
    theme: 'snow',
    placeholder: 'Γράψτε παρατηρήσεις…',
    modules: {
      toolbar: [
        ['bold','italic','underline'],
        [{'list':'ordered'},{'list':'bullet'}],
        ['clean']
      ]
    }
  });
  loadSites();
  weekStart = getMonday(new Date());
  renderWeekNav();
  renderWeekGrid();
  setStatus('ok','✓ Συνδεδεμένος');
  
  // Δείκτης συγχρονισμού
  OfflineSync.updateSyncIndicator();
}

// ── ΑΝΤΙΚΑΤΑΣΤΗΣΕ ΤΗΝ ΥΠΑΡΧΟΥΣΑ saveEntry() ΜΕ ΑΥΤΗ ──
async function saveEntry() {
  const type     = document.getElementById('fType').value;
  const title    = document.getElementById('fTitle').value.trim();
  const descHtml = quill.getSemanticHTML();
  const isEmptyDesc = quill.getText().trim() === '';
  const link     = document.getElementById('fLink').value.trim() || pendingLink || '';
  const linkDesc = document.getElementById('fLinkDesc').value.trim() || pendingLinkDesc || '';

  if (!type) { showToast('Επιλέξτε τύπο','#e8600a'); return; }
  if (isEmptyDesc && !title) { showToast('Συμπληρώστε τίτλο ή παρατηρήσεις','#e8600a'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '…';

  const payload = {
    site_id:        selectedSiteId,
    entry_date:     selectedDate,
    entry_type:     type,
    title:          title || null,
    description:    isEmptyDesc ? null : descHtml,
    weather_data:   (type === 'weather' && weatherApiData) ? weatherApiData : null,
    external_link:  link || null,
    link_description: linkDesc || null,
  };

  if (!editingId) {
    payload.created_by = currentUser.id;
  }

  // Offline fallback
  if (!navigator.onLine) {
    if (editingId) {
      await OfflineSync.addToQueue('site_diary', { action: 'update', id: editingId, data: payload });
    } else {
      await OfflineSync.addToQueue('site_diary', { action: 'insert', data: payload });
    }
    showToast('⚠ Χωρίς σύνδεση – αποθηκεύτηκε τοπικά', '#e8600a');
    cancelForm();
    btn.disabled = false; btn.textContent = 'Αποθήκευση';
    OfflineSync.updateSyncIndicator();
    return;
  }

  let error;
  if (editingId) {
    ({ error } = await db.from('site_diary').update(payload).eq('id', editingId));
  } else {
    ({ error } = await db.from('site_diary').insert(payload));
  }

  if (error) {
    if (!navigator.onLine || error.message?.toLowerCase().includes('fetch')) {
      if (editingId) {
        await OfflineSync.addToQueue('site_diary', { action: 'update', id: editingId, data: payload });
      } else {
        await OfflineSync.addToQueue('site_diary', { action: 'insert', data: payload });
      }
      showToast('⚠ Αποθήκευση τοπικά λόγω σφάλματος', '#e8600a');
      cancelForm();
    } else {
      showToast('⚠ ' + error.message, '#e8600a');
    }
    btn.disabled = false; btn.textContent = 'Αποθήκευση';
    return;
  }

  showToast(editingId ? '✓ Αποθηκεύτηκε' : '✓ Καταχωρήθηκε');
  cancelForm();
  await loadWeek();
  renderDayPanel(selectedDate);
  btn.disabled = false; btn.textContent = 'Αποθήκευση';
}

// ... ΟΛΕΣ ΟΙ ΥΠΟΛΟΙΠΕΣ ΣΥΝΑΡΤΗΣΕΙΣ ΠΑΡΑΜΕΝΟΥΝ ΩΣ ΕΧΟΥΝ ...
// (Δεν χρειάζεται να τις πειράξουμε)

document.getElementById('deleteModal').addEventListener('click', function(e) { if(e.target===this) closeDeleteModal(); });
init();
</script>
</body>
</html>
